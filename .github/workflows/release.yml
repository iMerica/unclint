name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Test
        run: go test ./...

      - name: Compute version
        id: version
        run: |
          VERSION="v0.1.${GITHUB_RUN_NUMBER}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist

          build() {
            GOOS="$1"
            GOARCH="$2"
            NAME="unc_${VERSION}_${GOOS}_${GOARCH}"
            OUT="dist/${NAME}/unc"

            mkdir -p "dist/${NAME}"
            CGO_ENABLED=0 GOOS="${GOOS}" GOARCH="${GOARCH}" \
              go build \
                -trimpath \
                -ldflags="-s -w -X main.version=${VERSION}" \
                -o "${OUT}" \
                ./cmd/unc

            tar -C "dist/${NAME}" -czf "dist/${NAME}.tar.gz" unc
            rm -rf "dist/${NAME}"
          }

          build darwin arm64
          build darwin amd64
          build linux amd64
          build linux arm64

          cd dist
          shasum -a 256 *.tar.gz > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            dist/*.tar.gz \
            dist/SHA256SUMS.txt \
            --title "${VERSION}" \
            --notes "Automated release from master."

      - name: Update Homebrew tap
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./scripts/update-homebrew.sh
